
    <form [formGroup]="form" class="space-y-4">
        <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input id="email" formControlName="email" type="email" class="rounded-xl focus:outline-none focus:ring-2 w-full border
         border-gray-300 px-4 py-3 shadow-sm focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input id="password" formControlName="password" type="password" class="w-full px-4 py-3
        border border-gray-300 rounded-xl shadow-sm p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white py-3 mt-1 rounded-xl
         hover:bg-blue-600 transition">Register</button>
    </form>
