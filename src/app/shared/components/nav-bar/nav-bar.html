<nav
  class="w-full h-18 absolute z-50 flex px-6 py-4 items-center justify-between border-b border-blue-100/10 text-black"
  [ngClass]="isHome ? 'text-white' : 'text-black'"
  [ngClass]="
    overlay ? 'absolute top-0 left-0 text-white bg-transparent' : 'relative w-full shadow bg-white'
  "
>
  <a href="/" class="flex items-center">
    <img src="/images/logo/logo.png" alt="Auryvin Logo" class="w-10 h-10" />
  </a>

  <div class="hidden mx-4 md:flex gap-6">
    <a class="hover:text-orange-300 transition" href="#">Buy</a>
    <a class="hover:text-orange-300 transition" href="#">Sell</a>
    <a class="hover:text-orange-300 transition" href="#">Rent</a>
  </div>

  <div>
    <button
      type="button"
      class="border border-gray-300 rounded-xl px-4 py-1 cursor-pointer hover:bg-black hover:text-orange-300 focus:ring-0 hover:ring-0 focus:outline-none transition"
      (click)="goToLogin()"
    >
      Login
    </button>
  </div>
</nav>
